<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>دخول الإدارة | مكتب المحامي ياسر الربيع</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Tajawal',sans-serif;min-height:100vh;background:linear-gradient(135deg,#0D1B2A 0%,#1A2E45 100%);display:flex;align-items:center;justify-content:center;padding:24px;direction:rtl;}
    .admin-box{background:rgba(255,255,255,0.04);backdrop-filter:blur(24px);border:1px solid rgba(201,168,76,0.2);border-radius:24px;padding:52px 48px;width:100%;max-width:440px;box-shadow:0 32px 80px rgba(0,0,0,0.5);}
    .admin-header{text-align:center;margin-bottom:36px;}
    .admin-icon{width:72px;height:72px;background:rgba(201,168,76,0.1);border:2px solid rgba(201,168,76,0.35);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 16px;}
    .admin-header h1{font-size:22px;color:#fff;margin-bottom:4px;}
    .admin-header p{color:rgba(255,255,255,0.4);font-size:13px;}
    .form-group{margin-bottom:18px;}
    .form-group label{display:block;color:rgba(255,255,255,0.7);font-size:13px;font-weight:600;margin-bottom:8px;}
    .form-input{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(201,168,76,0.2);border-radius:10px;padding:13px 16px;color:#fff;font-family:'Tajawal',sans-serif;font-size:15px;direction:rtl;outline:none;transition:all .2s;}
    .form-input:focus{border-color:#C9A84C;box-shadow:0 0 0 3px rgba(201,168,76,0.15);}
    .form-input::placeholder{color:rgba(255,255,255,0.25);}
    .admin-btn{width:100%;background:linear-gradient(135deg,#C9A84C,#9A7A2E);color:#0D1B2A;border:none;border-radius:10px;padding:14px;font-family:'Tajawal',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:4px;}
    .admin-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(201,168,76,0.4);}
    .admin-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
    .error-msg{background:rgba(220,53,69,0.15);border:1px solid rgba(220,53,69,0.4);color:#ff8a8a;border-radius:8px;padding:12px 16px;font-size:13px;text-align:center;margin-bottom:16px;display:none;}
    .error-msg.show{display:block;}
    .back-link{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:20px;color:rgba(255,255,255,0.35);font-size:13px;text-decoration:none;transition:color .2s;}
    .back-link:hover{color:#C9A84C;}
    @media(max-width:480px){.admin-box{padding:36px 24px;}}
  </style>
</head>
<body>
<div class="admin-box">
  <div class="admin-header">
    <div class="admin-icon">🔐</div>
    <h1>لوحة تحكم الإدارة</h1>
    <p>مكتب المحامي ياسر الربيع</p>
  </div>
  <div class="error-msg" id="errMsg"></div>
  <div class="form-group">
    <label>البريد الإلكتروني</label>
    <input class="form-input" type="email" id="adminEmail" autocomplete="off" placeholder="أدخل البريد الإلكتروني"/>
  </div>
  <div class="form-group">
    <label>كلمة المرور</label>
    <input class="form-input" type="password" id="adminPass" placeholder="أدخل كلمة المرور"/>
  </div>
  <button class="admin-btn" id="adminBtn" onclick="adminLogin()">دخول</button>
  <a href="index.html" class="back-link">← العودة للموقع</a>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { FIREBASE_CONFIG } from './firebase-config.js';

  const app = initializeApp(FIREBASE_CONFIG);
  const auth = getAuth(app);

  window.adminLogin = async function() {
    const email = document.getElementById('adminEmail').value.trim();
    const pass = document.getElementById('adminPass').value;
    const err = document.getElementById('errMsg');
    const btn = document.getElementById('adminBtn');
    err.classList.remove('show');
    if (!email || !pass) { err.textContent = 'يرجى إدخال البريد الإلكتروني وكلمة المرور.'; err.classList.add('show'); return; }
    btn.disabled = true; btn.textContent = 'جاري التحقق...';
    try {
      await signInWithEmailAndPassword(auth, email, pass);
      sessionStorage.setItem('adminAuth', 'true');
      window.location.href = 'admin-dashboard.html';
    } catch(e) {
      btn.disabled = false; btn.textContent = 'دخول';
      err.textContent = 'البريد الإلكتروني أو كلمة المرور غير صحيحة.';
      err.classList.add('show');
    }
  };
  document.addEventListener('keydown', e => { if(e.key==='Enter') window.adminLogin(); });
</script>
</body>
</html>
