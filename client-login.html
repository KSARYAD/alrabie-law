<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>بوابة العميل | مكتب المحامي ياسر الربيع</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    body { min-height: 100vh; display: flex; flex-direction: column; }
    .login-page {
      min-height: 100vh;
      background: linear-gradient(135deg, #0D1B2A 0%, #1A2E45 60%, #1E3A5F 100%);
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }
    .login-bg-pattern {
      position: absolute; inset: 0;
      background-image: radial-gradient(circle at 1px 1px, rgba(201,168,76,0.06) 1px, transparent 0);
      background-size: 40px 40px;
    }
    .login-glow {
      position: absolute;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(201,168,76,0.08) 0%, transparent 70%);
      top: 50%; left: 50%; transform: translate(-50%,-50%);
      pointer-events: none;
    }
    .login-box {
      position: relative; z-index: 2;
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 24px;
      padding: 52px 48px;
      width: 100%; max-width: 480px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.4);
    }
    .login-header { text-align: center; margin-bottom: 40px; }
    .login-emblem {
      width: 80px; height: 80px;
      background: rgba(201,168,76,0.12);
      border: 2px solid rgba(201,168,76,0.4);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; margin: 0 auto 20px;
    }
    .login-header h1 { font-family: 'Amiri', serif; font-size: 26px; color: #fff; margin-bottom: 6px; }
    .login-header p { color: rgba(255,255,255,0.5); font-size: 14px; }
    .login-divider { width: 40px; height: 2px; background: #C9A84C; margin: 14px auto; }
    .login-form { display: flex; flex-direction: column; gap: 18px; }
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .form-group label { color: rgba(255,255,255,0.75); font-size: 13px; font-weight: 600; letter-spacing: 0.5px; }
    .login-input {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 10px; padding: 14px 16px;
      color: #fff; font-family: 'Tajawal', sans-serif; font-size: 15px;
      direction: rtl; transition: all 0.2s;
      outline: none; width: 100%;
    }
    .login-input:focus {
      border-color: #C9A84C;
      background: rgba(255,255,255,0.09);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.15);
    }
    .login-input::placeholder { color: rgba(255,255,255,0.3); }
    .login-btn {
      background: linear-gradient(135deg, #C9A84C 0%, #9A7A2E 100%);
      color: #0D1B2A; border: none; border-radius: 10px;
      padding: 15px; font-family: 'Tajawal', sans-serif;
      font-size: 16px; font-weight: 700; cursor: pointer;
      transition: all 0.25s; margin-top: 8px;
      box-shadow: 0 4px 20px rgba(201,168,76,0.3);
    }
    .login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(201,168,76,0.5); }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .login-error {
      background: rgba(220,53,69,0.15); border: 1px solid rgba(220,53,69,0.4);
      color: #ff8a8a; border-radius: 8px; padding: 12px 16px;
      font-size: 14px; text-align: center; display: none;
    }
    .login-error.show { display: block; }
    .back-link {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; margin-top: 24px;
      color: rgba(255,255,255,0.4); font-size: 13px;
      text-decoration: none; transition: color 0.2s;
    }
    .back-link:hover { color: #C9A84C; }
    .login-loading {
      display: none; text-align: center; padding: 20px;
      color: #C9A84C;
    }
    .spinner {
      width: 32px; height: 32px; border: 3px solid rgba(201,168,76,0.2);
      border-top-color: #C9A84C; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 520px) {
      .login-box { padding: 36px 24px; }
    }
  </style>
</head>
<body>
<div class="login-page">
  <div class="login-bg-pattern"></div>
  <div class="login-glow"></div>
  <div class="login-box">
    <div class="login-header">
      <div class="login-emblem">⚖</div>
      <h1>بوابة العميل</h1>
      <div class="login-divider"></div>
      <p>مكتب المحامي ياسر الربيع</p>
    </div>

    <div id="loginForm">
      <div class="login-error" id="loginError"></div>
      <div class="login-form">
        <div class="form-group">
          <label>رقم القضية</label>
          <input class="login-input" type="text" id="caseNumber" placeholder="أدخل رقم القضية" autocomplete="off"/>
        </div>
        <div class="form-group">
          <label>رقم الهوية الوطنية</label>
          <input class="login-input" type="text" id="nationalId" placeholder="أدخل رقم الهوية" maxlength="10" autocomplete="off"/>
        </div>
        <button class="login-btn" id="loginBtn" onclick="clientLogin()">دخول إلى ملفي</button>
      </div>
      <a href="index.html" class="back-link">← العودة إلى الموقع الرئيسي</a>
    </div>

    <div class="login-loading" id="loginLoading">
      <div class="spinner"></div>
      <p>جارٍ التحقق من بياناتك...</p>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { FIREBASE_CONFIG } from './firebase-config.js';

  const app = initializeApp(FIREBASE_CONFIG);
  const db = getFirestore(app);

  window.clientLogin = async function() {
    const caseNum = document.getElementById('caseNumber').value.trim();
    const natId = document.getElementById('nationalId').value.trim();
    const errorEl = document.getElementById('loginError');
    const btn = document.getElementById('loginBtn');
    const loading = document.getElementById('loginLoading');
    const form = document.getElementById('loginForm');

    errorEl.classList.remove('show');

    if (!caseNum || !natId) {
      errorEl.textContent = 'يرجى إدخال رقم القضية ورقم الهوية.';
      errorEl.classList.add('show'); return;
    }

    btn.disabled = true;
    form.style.opacity = '0.4';
    loading.style.display = 'block';

    try {
      const q = query(collection(db, 'clients'),
        where('caseNumber', '==', caseNum),
        where('nationalId', '==', natId)
      );
      const snap = await getDocs(q);

      if (snap.empty) {
        form.style.opacity = '1';
        loading.style.display = 'none';
        btn.disabled = false;
        errorEl.textContent = 'رقم القضية أو رقم الهوية غير صحيح. يرجى المحاولة مجدداً.';
        errorEl.classList.add('show');
      } else {
        const clientData = snap.docs[0].data();
        const clientId = snap.docs[0].id;
        sessionStorage.setItem('clientSession', JSON.stringify({ id: clientId, ...clientData, loginTime: Date.now() }));
        window.location.href = 'dashboard.html';
      }
    } catch (e) {
      form.style.opacity = '1';
      loading.style.display = 'none';
      btn.disabled = false;
      errorEl.textContent = 'حدث خطأ في الاتصال. يرجى المحاولة لاحقاً.';
      errorEl.classList.add('show');
    }
  };

  document.addEventListener('keydown', e => { if (e.key === 'Enter') window.clientLogin(); });
</script>
</body>
</html>
